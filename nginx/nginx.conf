# ═══════════════════════════════════════════════════════════════════════════════
# PulsePath — Nginx configuration
# Piloto Ayuntamiento de Barcelona · Expediente 2026_OVT_694068
# ═══════════════════════════════════════════════════════════════════════════════
#
# Estructura de URLs:
#   /           → employee-app   (PWA mobile — Vanilla JS + Vite)
#   /dashboard/ → employer-dashboard (dashboard RRHH — Vanilla JS + Chart.js)
#   /api/       → backend Node.js:3000 (reverse proxy)
#
# IMPORTANTE para el employer-dashboard:
#   El dist/ debe construirse con base='/dashboard/' en vite.config.js:
#     export default defineConfig({ base: '/dashboard/', ... })
#   De lo contrario los assets cargarán desde '/' en lugar de '/dashboard/'.
#
# SSL / Let's Encrypt:
#   Ver sección "HTTPS server block" al final (comentada).
#   Pasos: docker compose certbot → nginx -s reload → descomentar bloque HTTPS.
# ═══════════════════════════════════════════════════════════════════════════════


# ─── Upstream ────────────────────────────────────────────────────────────────
upstream backend {
    server backend:3000;
    # keepalive: reutiliza conexiones TCP al backend (menor latencia en requests frecuentes)
    keepalive 32;
}


# ─── HTTP (puerto 80) ─────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;                # Acepta cualquier host; sustituir por el dominio real

    # ── Certbot ACME challenge (Let's Encrypt) ────────────────────────────────
    # Certbot deposita aquí los ficheros de validación del dominio.
    # Este bloque DEBE quedar activo incluso tras habilitar HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Redirigir HTTP → HTTPS ────────────────────────────────────────────────
    # Descomenta esta línea cuando el certificado SSL esté en funcionamiento.
    # return 301 https://$host$request_uri;

    # ── Statics: employee-app (PWA — raíz) ────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ── API → backend ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend/api/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";            # keepalive upstream
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout ampliado para la generación de PDF con Puppeteer
        # (Chromium headless puede tardar 5-15 s en el primer request cold-start)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # Desactiva el buffer para respuestas de streaming futuras
        proxy_buffering off;
    }

    # ── Employer dashboard ─────────────────────────────────────────────────────
    # Sirve el dist/ del dashboard en /dashboard/
    # Prerequisito: vite.config.js del employer-dashboard debe tener base: '/dashboard/'
    location /dashboard/ {
        alias /usr/share/nginx/html/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;

        # Caché agresiva para assets versionados (Vite genera hashes en nombres)
        location ~* /dashboard/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Employee-app (PWA — SPA catch-all) ────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Assets versionados por Vite: caché larga
        location ~* ^/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Service Worker y manifest: nunca cachear
        location ~* (sw\.js|workbox-.*\.js|manifest\.webmanifest|registerSW\.js)$ {
            expires off;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Headers de seguridad ──────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Content-Security-Policy básico — ajustar según necesidades reales
    # Actualmente permite 'unsafe-inline' para scripts Vite en dev; endurecer en prod.
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    # ── Ocultar versión de nginx ──────────────────────────────────────────────
    server_tokens off;

    # ── Compresión gzip ───────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Límite de tamaño de request (protección contra uploads masivos) ───────
    client_max_body_size 2m;
}


