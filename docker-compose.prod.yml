# =============================================================================
# PulsePath — docker-compose PRODUCCIÓN (Neon DB)
# Base de datos: Neon (cloud PostgreSQL) — NO se arranca postgres local.
# DATABASE_URL apunta a Neon en el .env
# =============================================================================

services:

  # ─── Backend Node.js ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: pulsepath-backend
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - pulsepath-internal
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3000/',r=>{process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

  # ─── Nginx — reverse proxy + statics ───────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: pulsepath-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pulsepath-internal

# ─── Red interna ──────────────────────────────────────────────────────────────
networks:
  pulsepath-internal:
    driver: bridge
