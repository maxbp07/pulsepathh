services:
  postgres:
    image: postgres:16
    container_name: pulsepath-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulsepath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsepath}
      POSTGRES_DB: ${POSTGRES_DB:-pulsepath}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pulsepath-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pulsepath} -d ${POSTGRES_DB:-pulsepath}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development        # Stage multi-stage: incluye devDeps + código fuente
    container_name: pulsepath-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ADMIN_SECRET: ${ADMIN_SECRET}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
    networks:
      - pulsepath-net

volumes:
  postgres_data:

networks:
  pulsepath-net:
    driver: bridge
